// ── Helpers ────────────────────────────────────────────────
function getJobDayTotals(job,dayKey){
  let sh=0,cr=0;
  (job.week[dayKey]?.runs||[]).forEach(r=>r.counts.forEach(c=>{
    const v=job.shearers.reduce((s,sh)=>s+Number(c.counts[sh.id]||0),0);
    if(c.job==='Shearing')sh+=v;else cr+=v;
  }));
  return{sh,cr,total:sh+cr};
}

function getJobShedTotal(job){
  let sh=0,cr=0;
  DAYS.forEach(d=>{
    const t=getJobDayTotals(job,d);
    sh+=t.sh;cr+=t.cr;
  });
  return{sh,cr,total:sh+cr};
}

function getShearerTotals(job,sid,dayKey){
  const dayIdx=DAYS.indexOf(dayKey);
  let shBF=0,crBF=0,shDay=0,crDay=0;
  DAYS.forEach((d,i)=>{
    if(i>dayIdx)return;
    let sh=0,cr=0;
    (job.week[d]?.runs||[]).forEach(r=>r.counts.forEach(c=>{
      const v=Number(c.counts[sid]||0);
      if(c.job==='Shearing')sh+=v;else cr+=v;
    }));
    if(i<dayIdx){shBF+=sh;crBF+=cr;}
    else{shDay=sh;crDay=cr;}
  });
  return{
    shearing:{bf:shBF,day:shDay,tot:shBF+shDay},
    crutching:{bf:crBF,day:crDay,tot:crBF+crDay},
  };
}

function getStaffTotals(job,stid,dayKey){
  const dayIdx=DAYS.indexOf(dayKey);
  let bf=0,day=0;
  DAYS.forEach((d,i)=>{
    if(i>dayIdx)return;
    const v=Number((job.week[d]?.staff||{})[stid]?.runs||0);
    if(i<dayIdx)bf+=v;else day=v;
  });
  return{bf,day,tot:bf+day};
}

function exportCSV(job){
  const rows=[['Name','Role','Shearing Total','Crutching Total','Travel']];
  job.shearers.forEach(s=>{
    let sh=0,cr=0;
    DAYS.forEach(d=>{
      (job.week[d]?.runs||[]).forEach(r=>r.counts.forEach(c=>{
        const v=Number(c.counts[s.id]||0);
        if(c.job==='Shearing')sh+=v;else cr+=v;
      }));
    });
    rows.push([s.name,'Shearer',sh,cr,Number(job.travel[s.id]||0)]);
  });
  job.staff.forEach(st=>{
    let runs=0;
    DAYS.forEach(d=>{runs+=Number((job.week[d]?.staff||{})[st.id]?.runs||0);});
    rows.push([st.name,st.role,'-','-',Number(job.travel[st.id]||0)]);
  });
  return rows.map(r=>r.join(',')).join('\n');
}

// ── Run Card ───────────────────────────────────────────────
function RunCard({run,shearers,onUpdate,onDelete}){

  const runTotal=run.counts.reduce((s,c)=>s+shearers.reduce((ss,sh)=>ss+Number(c.counts[sh.id]||0),0),0);
  const addCount=job=>{
    const nc={id:uid(),cls:'Ewes',job,desc:'',counts:Object.fromEntries(shearers.map(s=>[s.id,0]))};
    onUpdate({...run,counts:[...run.counts,nc]});
  };
  return(
    <div style={{background:'#fff',borderRadius:12,border:`1px solid ${C.border}`,marginBottom:12,overflow:'hidden'}}>
      <div style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',background:C.navy,cursor:'pointer'}} onClick={()=>setCollapsed(c=>!c)}>
        <div style={{width:28,height:28,borderRadius:8,background:C.amber,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:14,color:'#fff',flexShrink:0}}>{run.num}</div>

        <span style={{color:'#93c5fd',fontSize:12}}>{run.counts.length} count{run.counts.length!==1?'s':''}</span>
        <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:8}}>
          <span style={{background:'rgba(255,255,255,0.15)',color:'#fff',fontSize:13,fontWeight:700,padding:'3px 10px',borderRadius:20}}>{runTotal} head</span>
          <button onClick={e=>{e.stopPropagation();onDelete();}} style={{color:'rgba(255,255,255,0.4)',fontSize:18}}>×</button>
          <span style={{color:'rgba(255,255,255,0.5)',fontSize:13}}>{collapsed?'▼':'▲'}</span>
        </div>
      </div>
      {!collapsed&&(
        <div style={{padding:14}}>
          {run.counts.map(c=>(
            <CountRow key={c.id} count={c} shearers={shearers}
              onChange={u=>onUpdate({...run,counts:run.counts.map(x=>x.id===c.id?u:x)})}

                  <td style={{padding:'10px 14px',textAlign:'center',color:C.gray}}>{t.shearing.bf||'—'}</td>
                  <td style={{padding:'10px 14px',textAlign:'center',fontWeight:700,color:C.blue}}>{t.shearing.day||'—'}</td>
                  <td style={{padding:'10px 14px',textAlign:'center',fontWeight:800,color:C.navy,fontSize:15}}>{t.shearing.tot||'—'}</td>
                  <td style={{padding:'10px 14px',textAlign:'center',color:C.gray}}>{t.crutching.bf||'—'}</td>
                  <td style={{padding:'10px 14px',textAlign:'center',fontWeight:700,color:C.crutch}}>{t.crutching.day||'—'}</td>
                  <td style={{padding:'10px 14px',textAlign:'center',fontWeight:800,color:C.navy,fontSize:15}}>{t.crutching.tot||'—'}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <p style={{fontSize:11,color:'#ccc',marginTop:8}}>SH = Shearing · CR = Crutching · BF = Brought Fwd · Tot = To Date</p>
    </Card>
  );
}

// ── Shed Staff ─────────────────────────────────────────────
function ShedStaffCard({job,dayKey,updateJob}){
  const day=job.week[dayKey];
  const updateRuns=(stid,val)=>{
    updateJob({...job,week:{...job.week,[dayKey]:{...day,staff:{...day.staff,[stid]:{...day.staff[stid],runs:val}}}}});
  };
  return(
    <Card style={{marginBottom:12}}>
      <SLabel>Shed staff</SLabel>
      {job.staff.map(st=>{
        const tots=getStaffTotals(job,st.id,dayKey);
        return(
          <div key={st.id} style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',padding:'10px 0',borderBottom:`1px solid #f3f4f6`}}>
            <div style={{width:36,height:36,borderRadius:'50%',background:C.navy,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:14,flexShrink:0}}>{st.name[0]}</div>
            <div style={{flex:1,minWidth:80}}>
              <p style={{fontWeight:700,fontSize:14}}>{st.name}</p>
              <p style={{fontSize:12,color:C.gray}}>{st.role}</p>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <span style={{fontSize:12,color:C.gray}}>Runs today:</span>
                <input type="number" min="0" max="20"
                  value={day.staff[st.id]?.runs||''}
                  onChange={e=>updateRuns(st.id,e.target.value)}
                  style={{width:52,padding:'6px 8px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:16,textAlign:'center',fontWeight:700}}/>
              </div>
              <div className="h-scroll">
                <table style={{borderCollapse:'collapse',fontSize:12}}>
                  <thead><tr>{['BF','Today','To Date','Travel'].map(h=><th key={h} style={{padding:'2px 10px',textAlign:'center',color:C.gray,fontWeight:600,whiteSpace:'nowrap'}}>{h}</th>)}</tr></thead>
                  <tbody><tr>
                    <td style={{padding:'4px 10px',textAlign:'center',color:C.gray}}>{tots.bf}</td>
                    <td style={{padding:'4px 10px',textAlign:'center',fontWeight:700,color:C.navy}}>{tots.day||0}</td>
                    <td style={{padding:'4px 10px',textAlign:'center',fontWeight:800,color:C.green,fontSize:14}}>{tots.tot}</td>
                    <td style={{padding:'4px 10px',textAlign:'center',color:C.gray}}>${job.travel[st.id]||0}</td>
                  </tr></tbody>
                </table>
              </div>
            </div>
          </div>
        );
      })}
    </Card>
  );
}

// ── Job Tally View ─────────────────────────────────────────
function JobView({job,updateJob,onBack,adminUnlocked}){
  const [day,setDay]=useState('monday');
  const [view,setView]=useState('tally');
  const dayData=job.week[day];

  const addRun=()=>{
    const num=(dayData.runs.length||0)+1;
    if(num>10)return;
    const nr={id:uid(),num,counts:[{id:uid(),cls:'Ewes',job:'Shearing',desc:'',counts:Object.fromEntries(job.shearers.map(s=>[s.id,0]))}]};
    updateJob({...job,week:{...job.week,[day]:{...dayData,runs:[...dayData.runs,nr]}}});
  };
  const updateRun=(id,u)=>updateJob({...job,week:{...job.week,[day]:{...dayData,runs:dayData.runs.map(r=>r.id===id?u:r)}}});
  const deleteRun=(id)=>updateJob({...job,week:{...job.week,[day]:{...dayData,runs:dayData.runs.filter(r=>r.id!==id)}}});
  const setNotes=v=>updateJob({...job,week:{...job.week,[day]:{...dayData,notes:v}}});

  const dayTotals=useMemo(()=>{
    let sh=0,cr=0;
    dayData.runs.forEach(r=>r.counts.forEach(c=>{
      const v=job.shearers.reduce((s,sh)=>s+Number(c.counts[sh.id]||0),0);
      if(c.job==='Shearing')sh+=v;else cr+=v;
    }));
    return{sh,cr};
  },[dayData]);

  const shedTotal=useMemo(()=>getJobShedTotal(job),[job]);

  const handleCSV=()=>{
    const csv=exportCSV(job);
    const blob=new Blob([csv],{type:'text/csv'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`igang-${job.property.replace(/\s/g,'-').toLowerCase()}.csv`;a.click();
  };

  return(
    <div>
      {/* Job sub-header */}
      <div style={{background:C.navy,padding:'10px 16px',margin:'-16px -12px 16px',borderBottom:`2px solid ${C.navyDark}`}}>
        <div style={{maxWidth:720,margin:'0 auto'}}>
          <button onClick={onBack} style={{color:'#93c5fd',fontSize:13,fontWeight:600,marginBottom:6,display:'flex',alignItems:'center',gap:4}}>← All jobs</button>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
            <div>
              <p style={{color:'#fff',fontWeight:800,fontSize:17}}>{job.property}</p>
              <p style={{color:'#64748b',fontSize:12}}>{job.address}</p>
            </div>
            <div style={{display:'flex',gap:4}}>
              {[['tally','📋'],['summary','📊'],adminUnlocked&&['admin','⚙️']].filter(Boolean).map(([v,icon])=>(
                <button key={v} onClick={()=>setView(v)}
                  style={{padding:'6px 10px',borderRadius:8,fontSize:12,fontWeight:700,background:view===v?C.amber:'transparent',color:view===v?'#fff':'#93c5fd'}}>
                  {icon} {v.charAt(0).toUpperCase()+v.slice(1)}
                </button>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* Day tabs */}
      {view==='tally'&&(
        <div className="h-scroll" style={{marginBottom:16,background:'#fff',borderRadius:12,border:`1px solid ${C.border}`}}>
          <div style={{display:'flex',minWidth:'max-content'}}>
            {DAYS.map((d,i)=>{
              const active=d===day;
              const hasData=(job.week[d]?.runs||[]).length>0;
              return(
                <button key={d} onClick={()=>setDay(d)}
                  style={{padding:'10px 16px',fontSize:13,fontWeight:700,color:active?C.navy:'#9ca3af',borderBottom:active?`3px solid ${C.navy}`:'3px solid transparent',whiteSpace:'nowrap',background:'none',position:'relative',minWidth:60}}>
                  {DAY_SHORT[i]}
                  <span style={{fontSize:9,display:'block',color:active?C.gray:'#d1d5db'}}>{DATES[i]}</span>
                  {hasData&&<span style={{position:'absolute',top:8,right:8,width:5,height:5,borderRadius:'50%',background:C.amber}}/>}
                </button>
              );
            })}
          </div>
        </div>
      )}

      {view==='tally'&&(
        <div>
          <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
            {dayTotals.sh>0&&(
              <div style={{flex:1,minWidth:110,background:C.blueBg,borderRadius:12,padding:'14px 16px',border:`1px solid ${C.blue}30`}}>
                <p style={{fontSize:11,color:C.blue,fontWeight:700,marginBottom:2}}>SHEARING TODAY</p>
                <p style={{fontSize:30,fontWeight:800,color:C.blue}}>{dayTotals.sh}</p>
              </div>
            )}
            {dayTotals.cr>0&&(
              <div style={{flex:1,minWidth:110,background:C.crutchBg,borderRadius:12,padding:'14px 16px',border:`1px solid ${C.crutch}30`}}>
                <p style={{fontSize:11,color:C.crutch,fontWeight:700,marginBottom:2}}>CRUTCHING TODAY</p>
                <p style={{fontSize:30,fontWeight:800,color:C.crutch}}>{dayTotals.cr}</p>
              </div>
            )}
            <div style={{flex:1,minWidth:110,background:'#f0fdf4',borderRadius:12,padding:'14px 16px',border:`1px solid ${C.green}30`}}>
              <p style={{fontSize:11,color:C.green,fontWeight:700,marginBottom:2}}>SHED TOTAL</p>
              <p style={{fontSize:30,fontWeight:800,color:C.green}}>{shedTotal.total}</p>
            </div>
          </div>

          {dayData.runs.map(r=>(
            <RunCard key={r.id} run={r} shearers={job.shearers}
              onUpdate={u=>updateRun(r.id,u)}
              onDelete={()=>deleteRun(r.id)}/>
          ))}

          {dayData.runs.length<10&&(
            <button onClick={addRun} style={{width:'100%',padding:'12px',borderRadius:12,border:`2px dashed ${C.navy}40`,fontSize:14,fontWeight:700,color:C.navy,background:'transparent',marginBottom:12}}>
              + Add Run {dayData.runs.length+1}
            </button>
          )}

          <ShearerTotalsCard job={job} dayKey={day}/>
          <ShedStaffCard job={job} dayKey={day} updateJob={updateJob}/>

          <Card>
            <SLabel>Notes for the day</SLabel>
            <textarea value={dayData.notes} onChange={e=>setNotes(e.target.value)}
              placeholder="Add any notes..."
              rows={3}
              style={{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:14,resize:'vertical',lineHeight:1.6}}/>
          </Card>
        </div>
      )}

      {view==='summary'&&(
        <div>
          <Card style={{marginBottom:12,background:C.navy,border:'none'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:10}}>
              <div>
                <p style={{color:C.amber,fontSize:12,fontWeight:700,letterSpacing:1,marginBottom:4}}>END OF SHED SUMMARY</p>
                <p style={{color:'#fff',fontSize:20,fontWeight:800}}>{job.property}</p>
                <p style={{color:'#93c5fd',fontSize:13}}>Woolaway Shearing Co. · Lachlan Holmes</p>
                <p style={{color:'#64748b',fontSize:12,marginTop:4}}>{job.start} · {job.address}</p>
              </div>
              <div style={{textAlign:'right'}}>
                <p style={{color:'#93c5fd',fontSize:12,marginBottom:2}}>Total sheep</p>
                <p style={{color:C.amber,fontSize:36,fontWeight:800,lineHeight:1}}>{shedTotal.total.toLocaleString()}</p>
              </div>
            </div>
          </Card>

          <Card style={{marginBottom:12}}>
            <SLabel>Shearers</SLabel>
            <div className="h-scroll">
              <table style={{borderCollapse:'collapse',minWidth:'100%',fontSize:13}}>
                <thead>
                  <tr style={{background:'#f9fafb'}}>
                    {['Name','Shearing','Crutching','Travel'].map(h=>(
                      <th key={h} style={{padding:'8px 12px',textAlign:h==='Name'?'left':'center',fontWeight:600,color:C.gray,borderBottom:`1px solid ${C.border}`,whiteSpace:'nowrap'}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {job.shearers.map((s,i)=>{
                    let sh=0,cr=0;
                    DAYS.forEach(d=>{
                      (job.week[d]?.runs||[]).forEach(r=>r.counts.forEach(c=>{
                        const v=Number(c.counts[s.id]||0);
                        if(c.job==='Shearing')sh+=v;else cr+=v;
                      }));
                    });
                    if(!sh&&!cr)return null;
                    return(
                      <tr key={s.id} style={{background:i%2===0?'#fff':'#fafafa'}}>
                        <td style={{padding:'10px 12px',fontWeight:700}}>{s.name}</td>
                        <td style={{padding:'10px 12px',textAlign:'center',color:C.blue,fontWeight:700}}>{sh||'—'}</td>
                        <td style={{padding:'10px 12px',textAlign:'center',color:C.crutch,fontWeight:700}}>{cr||'—'}</td>
                        <td style={{padding:'10px 12px',textAlign:'center',color:C.gray}}>${job.travel[s.id]||0}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </Card>

          {adminUnlocked&&(
            <Card>
              <SLabel>Export</SLabel>
              <button onClick={handleCSV} style={{width:'100%',padding:'14px',borderRadius:10,background:C.green,color:'#fff',fontSize:15,fontWeight:700}}>
                ↓ Download CSV — {job.property}
              </button>
            </Card>
          )}
        </div>
      )}

      {view==='admin'&&adminUnlocked&&(
        <div>
          <Card style={{marginBottom:12}}>
            <SLabel>Pay rates (per head)</SLabel>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              {[['Shearing','shearing'],['Crutching','crutching']].map(([label,key])=>(
                <div key={key}>
                  <label style={{fontSize:13,fontWeight:600,color:C.gray,display:'block',marginBottom:6}}>{label}</label>
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <span style={{fontSize:16,fontWeight:700,color:C.gray}}>$</span>
                    <input type="number" step="0.05" value={job.rates[key]}
                      onChange={e=>updateJob({...job,rates:{...job.rates,[key]:Number(e.target.value)}})}
                      style={{flex:1,padding:'10px',borderRadius:8,border:`1px solid ${C.border}`,fontSize:16,fontWeight:700}}/>
                    <span style={{fontSize:12,color:C.gray}}>/head</span>
                  </div>
                </div>
              ))}
            </div>
          </Card>
          <Card>
            <SLabel>Travel allowances</SLabel>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              {[...job.shearers,...job.staff].map(p=>(
                <div key={p.id} style={{display:'flex',alignItems:'center',gap:8,background:'#f9fafb',borderRadius:8,padding:'10px 12px'}}>
                  <span style={{fontWeight:700,fontSize:13,flex:1}}>{p.name}</span>
                  <span style={{fontSize:14,color:C.gray}}>$</span>
                  <input type="number" value={job.travel[p.id]||0}
                    onChange={e=>updateJob({...job,travel:{...job.travel,[p.id]:Number(e.target.value)}})}
                    style={{width:64,padding:'6px 8px',borderRadius:6,border:`1px solid ${C.border}`,fontSize:15,fontWeight:700,textAlign:'center'}}/>
                </div>
              ))}
            </div>
          </Card>
        </div>
      )}
    </div>
  );
}

// ── App ────────────────────────────────────────────────────
function App(){
  const [jobs,setJobs]=useState(JOBS_INIT);
  const [selectedId,setSelectedId]=useState(null);
  const [adminUnlocked,setAdminUnlocked]=useState(false);
  const [showPin,setShowPin]=useState(false);
  const [pin,setPin]=useState('');
  const [pinErr,setPinErr]=useState(false);

  const selectedJob=useMemo(()=>jobs.find(j=>j.id===selectedId),[jobs,selectedId]);
  const updateJob=useCallback(updated=>setJobs(js=>js.map(j=>j.id===updated.id?updated:j)),[]);

  const tryUnlock=()=>{
    if(pin===ADMIN_PIN){setAdminUnlocked(true);setShowPin(false);setPin('');}
    else{setPinErr(true);}
  };

  return(
    <div style={{minHeight:'100vh',background:C.bg}}>
      {/* Header */}
      <div style={{background:`linear-gradient(135deg,${C.navyDark},${C.navy})`,padding:'0 16px',position:'sticky',top:0,zIndex:50,boxShadow:'0 2px 12px rgba(0,0,0,0.2)'}}>
        <div style={{maxWidth:720,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between',height:56}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:34,height:34,borderRadius:10,background:C.amber,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:16,color:'#fff',letterSpacing:-1}}>iG</div>
            <div>
              <p style={{color:'#fff',fontWeight:800,fontSize:16,lineHeight:1.1}}>iGang</p>
              <p style={{color:'#93c5fd',fontSize:10,fontWeight:600}}>Woolaway Shearing Co.</p>
            </div>
          </div>
          <button onClick={()=>{if(adminUnlocked){setAdminUnlocked(false);}else{setShowPin(true);setPinErr(false);setPin('');}}}
            style={{padding:'6px 12px',borderRadius:8,fontSize:12,fontWeight:700,background:adminUnlocked?'#dcfce7':'transparent',color:adminUnlocked?C.green:'#93c5fd',border:adminUnlocked?`1px solid ${C.green}30`:'none'}}>
            {adminUnlocked?'🔓 Admin':'🔒 Admin'}
          </button>
        </div>
      </div>

      {/* PIN modal */}
      {showPin&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100,padding:20}}>
          <div style={{background:'#fff',borderRadius:16,padding:28,width:'100%',maxWidth:320,textAlign:'center'}}>
            <div style={{fontSize:32,marginBottom:12}}>🔒</div>
            <p style={{fontWeight:700,fontSize:18,marginBottom:6}}>Admin Access</p>
            <p style={{fontSize:13,color:C.gray,marginBottom:20}}>Enter contractor PIN</p>
            <input type="password" value={pin} onChange={e=>{setPin(e.target.value);setPinErr(false);}}
              onKeyDown={e=>e.key==='Enter'&&tryUnlock()}
              placeholder="PIN" autoFocus
              style={{width:'100%',padding:'12px',borderRadius:10,border:`1px solid ${pinErr?C.red:C.border}`,fontSize:22,textAlign:'center',marginBottom:8,letterSpacing:6}}/>
            {pinErr&&<p style={{color:C.red,fontSize:13,marginBottom:8}}>Incorrect PIN</p>}
            <div style={{display:'flex',gap:8,marginTop:8}}>
              <button onClick={()=>setShowPin(false)} style={{flex:1,padding:'12px',borderRadius:10,border:`1px solid ${C.border}`,fontSize:14,fontWeight:600,color:C.gray}}>Cancel</button>
              <button onClick={tryUnlock} style={{flex:1,padding:'12px',borderRadius:10,background:C.navy,color:'#fff',fontSize:14,fontWeight:700}}>Unlock</button>
            </div>
            <p style={{fontSize:11,color:'#ccc',marginTop:12}}>Demo PIN: 1234</p>
          </div>
        </div>
      )}

      <div style={{maxWidth:720,margin:'0 auto',padding:'16px 12px 80px'}}>
        {!selectedJob
          ?<HomeScreen jobs={jobs} onSelect={setSelectedId} adminUnlocked={adminUnlocked}/>
          :<JobView job={selectedJob} updateJob={updateJob} onBack={()=>setSelectedId(null)} adminUnlocked={adminUnlocked}/>
        }
      </div>

      <div style={{position:'fixed',bottom:0,left:0,right:0,background:'rgba(255,255,255,0.95)',backdropFilter:'blur(8px)',borderTop:`1px solid ${C.border}`,padding:'8px 16px',textAlign:'center'}}>
        <p style={{fontSize:11,color:'#d1d5db'}}>iGang · Powered by Southern Reach Digital · southernreachdigital.com.au</p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
