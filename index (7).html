<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>iGang — Woolaway Shearing Co.</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
button{cursor:pointer;border:none;background:none;font-family:inherit}
input,select,textarea{font-family:inherit}
.hs{overflow-x:auto;-webkit-overflow-scrolling:touch}
</style>
</head>
<body>
<div id="root"></div>
<script type="module">
import { createElement as e, useState, useMemo } from 'https://esm.sh/react@18';
import { createRoot } from 'https://esm.sh/react-dom@18/client';

const N='#1a3a5c',ND='#0f2236',AM='#e8a020',GR='#6b7280',BD='#e5e7eb';
const BL='#1d4ed8',BLB='#dbeafe',CR='#d97706',CRB='#fef3c7';
const GN='#166534',GNB='#dcfce7',RD='#dc2626';
const PIN='1234';
const DAYS=['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
const DS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const DD=['23/3','24/3','25/3','26/3','27/3','28/3','29/3'];
const CLS=['Ewes','Wethers','Rams','Lambs','Other'];

let _id=0;
const uid=()=>'u'+(++_id);

const mkC=(sh,v)=>{const o={};sh.forEach(s=>o[s.id]=v||0);return o;};
const mkRun=(num,cls,job,desc,sh,v)=>({id:uid(),num,counts:[{id:uid(),cls,job,desc,counts:mkC(sh,v||0)}]});
const mkDay=(runs,staff,notes)=>({runs:runs||[],staff:staff||{},notes:notes||''});

const J1=[{id:'s1',name:'Hayden'},{id:'s2',name:'Gonz'},{id:'s3',name:'Nathan B'},{id:'s4',name:'Nathan'},{id:'s5',name:'LH'}];
const J1S=[{id:'st1',name:'Connor',role:'Wool Handler'}];
const J2=[{id:'g1',name:'Davo'},{id:'g2',name:'Jacko'},{id:'g3',name:'Bretto'},{id:'g4',name:'Mick'},{id:'g5',name:'Simo'}];
const J2S=[{id:'gst1',name:'Bec',role:'Wool Handler'},{id:'gst2',name:'Tash',role:'Wool Handler'},{id:'gst3',name:'Ray',role:'Classer'}];
const J3=[{id:'m1',name:'Kel'},{id:'m2',name:'Thommo'},{id:'m3',name:'Bazza'}];
const J3S=[{id:'mst1',name:'Shaz',role:'Wool Handler'},{id:'mst2',name:'Deb',role:'Wool Handler'}];

const JOBS=[
  {id:'j1',property:'Mueller',address:'Eyre Peninsula SA',type:'Shearing',status:'active',start:'23/03/2026',
   rates:{shearing:4.80,crutching:1.50},shearers:J1,staff:J1S,travel:{s1:45,s2:45,s3:45,s4:45,s5:0,st1:50},
   week:{monday:mkDay([mkRun(1,'Ewes','Shearing','',J1,55),mkRun(2,'Ewes','Shearing','',J1,55),mkRun(3,'Lambs','Shearing','',J1,55),mkRun(4,'Lambs','Shearing','',J1,55)],{st1:{runs:4}},'Good day.'),
   tuesday:mkDay(),wednesday:mkDay(),thursday:mkDay(),friday:mkDay(),saturday:mkDay(),sunday:mkDay()}},
  {id:'j2',property:'Gillap Pastoral',address:'South West Victoria',type:'Shearing',status:'active',start:'23/03/2026',
   rates:{shearing:4.10,crutching:1.35},shearers:J2,staff:J2S,travel:{g1:60,g2:60,g3:60,g4:60,g5:60,gst1:55,gst2:55,gst3:70},
   week:{monday:mkDay([mkRun(1,'Wethers','Shearing','',J2,70),mkRun(2,'Wethers','Shearing','',J2,70),mkRun(3,'Ewes','Shearing','',J2,70),mkRun(4,'Ewes','Shearing','',J2,70)],{gst1:{runs:4},gst2:{runs:4},gst3:{runs:4}},''),
   tuesday:mkDay(),wednesday:mkDay(),thursday:mkDay(),friday:mkDay(),saturday:mkDay(),sunday:mkDay()}},
  {id:'j3',property:'McDonalds Farm',address:'Limestone Coast SA',type:'Crutching',status:'active',start:'23/03/2026',
   rates:{shearing:4.80,crutching:1.50},shearers:J3,staff:J3S,travel:{m1:40,m2:40,m3:40,mst1:40,mst2:40},
   week:{monday:mkDay([mkRun(1,'Lambs','Crutching','Lamb FC',J3,120),mkRun(2,'Lambs','Crutching','Lamb FC',J3,120),mkRun(3,'Lambs','Crutching','Lamb FC',J3,120),mkRun(4,'Lambs','Crutching','Lamb FC',J3,120)],{mst1:{runs:4},mst2:{runs:4}},'Crutching only.'),
   tuesday:mkDay(),wednesday:mkDay(),thursday:mkDay(),friday:mkDay(),saturday:mkDay(),sunday:mkDay()}},
];

const getDT=(job,d)=>{let sh=0,cr=0;(job.week[d]?.runs||[]).forEach(r=>r.counts.forEach(c=>{const v=job.shearers.reduce((s,sh)=>s+Number(c.counts[sh.id]||0),0);if(c.job==='Shearing')sh+=v;else cr+=v;}));return{sh,cr,total:sh+cr};};
const getST=(job)=>{let sh=0,cr=0;DAYS.forEach(d=>{const t=getDT(job,d);sh+=t.sh;cr+=t.cr;});return{sh,cr,total:sh+cr};};
const getShT=(job,sid,dk)=>{const di=DAYS.indexOf(dk);let shBF=0,crBF=0,shD=0,crD=0;DAYS.forEach((d,i)=>{if(i>di)return;let sh=0,cr=0;(job.week[d]?.runs||[]).forEach(r=>r.counts.forEach(c=>{const v=Number(c.counts[sid]||0);if(c.job==='Shearing')sh+=v;else cr+=v;}));if(i<di){shBF+=sh;crBF+=cr;}else{shD=sh;crD=cr;}});return{shearing:{bf:shBF,day:shD,tot:shBF+shD},crutching:{bf:crBF,day:crD,tot:crBF+crD}};};
const getStT=(job,stid,dk)=>{const di=DAYS.indexOf(dk);let bf=0,day=0;DAYS.forEach((d,i)=>{if(i>di)return;const v=Number((job.week[d]?.staff||{})[stid]?.runs||0);if(i<di)bf+=v;else day=v;});return{bf,day,tot:bf+day};};

const d=(...args)=>e('div',...args);
const p=(...args)=>e('p',...args);
const sp=(...args)=>e('span',...args);
const btn=(...args)=>e('button',...args);
const inp=(...args)=>e('input',...args);

function Tag({type}){
  const [bg,col]=type==='Shearing'?[BLB,BL]:[CRB,CR];
  return sp({style:{background:bg,color:col,fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:12}},type);
}

function CountRow({count,shearers,onChange,onDelete}){
  const mob=shearers.reduce((s,sh)=>s+Number(count.counts[sh.id]||0),0);
  return d({style:{background:'#f9fafb',borderRadius:10,padding:12,marginBottom:8,border:`1px solid ${BD}`}},
    d({style:{display:'flex',alignItems:'center',gap:8,marginBottom:10,flexWrap:'wrap'}},
      e(Tag,{type:count.job}),
      e('select',{value:count.cls,onChange:ev=>onChange({...count,cls:ev.target.value}),style:{padding:'4px 8px',borderRadius:6,border:`1px solid ${BD}`,fontSize:13,fontWeight:600,background:'#fff'}},
        CLS.map(c=>e('option',{key:c,value:c},c))),
      count.job==='Crutching'&&inp({value:count.desc,onChange:ev=>onChange({...count,desc:ev.target.value}),placeholder:'e.g. Lamb FC',style:{flex:1,minWidth:110,padding:'4px 8px',borderRadius:6,border:`1px solid ${BD}`,fontSize:13}}),
      btn({onClick:onDelete,style:{marginLeft:'auto',color:RD,fontSize:20,fontWeight:700}},'×')
    ),
    d({className:'hs'},
      e('table',{style:{borderCollapse:'collapse'}},
        e('thead',null,e('tr',null,
          ...shearers.map(sh=>e('th',{key:sh.id,style:{padding:'4px 8px',textAlign:'center',fontSize:11,fontWeight:700,color:GR,whiteSpace:'nowrap',minWidth:68}},sh.name)),
          e('th',{style:{padding:'4px 12px',textAlign:'center',fontSize:11,fontWeight:700,color:N,whiteSpace:'nowrap',borderLeft:`2px solid ${BD}`,minWidth:80}},'MOB TOTAL')
        )),
        e('tbody',null,e('tr',null,
          ...shearers.map(sh=>e('td',{key:sh.id,style:{padding:'4px 6px',textAlign:'center'}},
            inp({type:'number',min:0,value:count.counts[sh.id]||'',onChange:ev=>onChange({...count,counts:{...count.counts,[sh.id]:Number(ev.target.value)||0}}),style:{width:58,padding:'8px 4px',borderRadius:8,border:`1px solid ${BD}`,fontSize:18,textAlign:'center',fontWeight:700,background:'#fff'}})
          )),
          e('td',{style:{padding:'4px 10px',textAlign:'center',borderLeft:`2px solid ${BD}`}},
            d({style:{background:N,borderRadius:8,padding:'8px 10px',display:'inline-block',minWidth:56}},
              sp({style:{color:'#fff',fontSize:18,fontWeight:800}},mob)))
        ))
      )
    )
  );
}

function RunCard({run,shearers,onUpdate,onDelete}){
  const [open,setOpen]=useState(true);
  const total=run.counts.reduce((s,c)=>s+shearers.reduce((ss,sh)=>ss+Number(c.counts[sh.id]||0),0),0);
  const addC=job=>{const nc={id:uid(),cls:'Ewes',job,desc:'',counts:mkC(shearers,0)};onUpdate({...run,counts:[...run.counts,nc]});};
  return d({style:{background:'#fff',borderRadius:12,border:`1px solid ${BD}`,marginBottom:12,overflow:'hidden'}},
    d({style:{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',background:N,cursor:'pointer'},onClick:()=>setOpen(o=>!o)},
      d({style:{width:28,height:28,borderRadius:8,background:AM,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,fontSize:14,color:'#fff',flexShrink:0}},run.num),
      sp({style:{color:'#fff',fontWeight:700,fontSize:15}},'Run '+run.num),
      sp({style:{color:'#93c5fd',fontSize:12}},run.counts.length+' count'+(run.counts.length!==1?'s':'')),
      d({style:{marginLeft:'auto',display:'flex',alignItems:'center',gap:8}},
        sp({style:{background:'rgba(255,255,255,0.15)',color:'#fff',fontSize:13,fontWeight:700,padding:'3px 10px',borderRadius:20}},total+' head'),
        btn({onClick:ev=>{ev.stopPropagation();onDelete();},style:{color:'rgba(255,255,255,0.4)',fontSize:20,fontWeight:700}},'×')
      )
    ),
    open&&d({style:{padding:14}},
      ...run.counts.map(c=>e(CountRow,{key:c.id,count:c,shearers,
        onChange:u=>onUpdate({...run,counts:run.counts.map(x=>x.id===c.id?u:x)}),
        onDelete:()=>onUpdate({...run,counts:run.counts.filter(x=>x.id!==c.id)})})),
      d({style:{display:'flex',gap:8,marginTop:6}},
        btn({onClick:()=>addC('Shearing'),style:{flex:1,padding:'8px 0',borderRadius:8,border:`1px dashed ${BL}`,fontSize:13,fontWeight:600,color:BL,background:BLB}},'+ Shearing'),
        btn({onClick:()=>addC('Crutching'),style:{flex:1,padding:'8px 0',borderRadius:8,border:`1px dashed ${CR}`,fontSize:13,fontWeight:600,color:CR,background:CRB}},'+ Crutching')
      )
    )
  );
}

function JobView({job,updateJob,onBack,admin}){
  const [day,setDay]=useState('monday');
  const [tab,setTab]=useState('tally');
  const dd=job.week[day];

  const addRun=()=>{
    const num=(dd.runs.length||0)+1;if(num>10)return;
    const nr={id:uid(),num,counts:[{id:uid(),cls:'Ewes',job:'Shearing',desc:'',counts:mkC(job.shearers,0)}]};
    updateJob({...job,week:{...job.week,[day]:{...dd,runs:[...dd.runs,nr]}}});
  };

  const dt=useMemo(()=>{let sh=0,cr=0;dd.runs.forEach(r=>r.counts.forEach(c=>{const v=job.shearers.reduce((s,sh)=>s+Number(c.counts[sh.id]||0),0);if(c.job==='Shearing')sh+=v;else cr+=v;}));return{sh,cr};},[dd]);
  const st=getST(job);

  return d(null,
    d({style:{background:N,padding:'10px 16px',margin:'-16px -12px 16px'}},
      btn({onClick:onBack,style:{color:'#93c5fd',fontSize:13,fontWeight:600,marginBottom:6,display:'block'}},'← All jobs'),
      d({style:{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}},
        d(null,
          d({style:{color:'#fff',fontWeight:800,fontSize:17}},job.property),
          d({style:{color:'#64748b',fontSize:12}},job.address)
        ),
        d({style:{display:'flex',gap:4}},
          ...['tally','summary',...(admin?['admin']:[])].map(v=>
            btn({key:v,onClick:()=>setTab(v),style:{padding:'6px 10px',borderRadius:8,fontSize:12,fontWeight:700,background:tab===v?AM:'transparent',color:tab===v?'#fff':'#93c5fd'}},
              v.charAt(0).toUpperCase()+v.slice(1))
          )
        )
      )
    ),

    tab==='tally'&&d(null,
      d({className:'hs',style:{marginBottom:16,background:'#fff',borderRadius:12,border:`1px solid ${BD}`}},
        d({style:{display:'flex',minWidth:'max-content'}},
          ...DAYS.map((dy,i)=>{
            const active=dy===day,has=(job.week[dy]?.runs||[]).length>0;
            return btn({key:dy,onClick:()=>setDay(dy),style:{padding:'10px 16px',fontSize:13,fontWeight:700,color:active?N:'#9ca3af',borderBottom:active?'3px solid '+N:'3px solid transparent',whiteSpace:'nowrap',background:'none',position:'relative',minWidth:60}},
              DS[i],sp({style:{fontSize:9,display:'block',color:active?GR:'#d1d5db'}},DD[i]),
              has&&sp({style:{position:'absolute',top:8,right:8,width:5,height:5,borderRadius:'50%',background:AM}})
            );
          })
        )
      ),
      d({style:{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}},
        dt.sh>0&&d({style:{flex:1,minWidth:110,background:BLB,borderRadius:12,padding:'14px 16px'}},
          d({style:{fontSize:11,color:BL,fontWeight:700,marginBottom:2}},'SHEARING TODAY'),
          d({style:{fontSize:30,fontWeight:800,color:BL}},dt.sh)
        ),
        dt.cr>0&&d({style:{flex:1,minWidth:110,background:CRB,borderRadius:12,padding:'14px 16px'}},
          d({style:{fontSize:11,color:CR,fontWeight:700,marginBottom:2}},'CRUTCHING TODAY'),
          d({style:{fontSize:30,fontWeight:800,color:CR}},dt.cr)
        ),
        dt.sh===0&&dt.cr===0&&d({style:{flex:1,minWidth:110,background:'#f9fafb',borderRadius:12,padding:'14px 16px',border:`1px solid ${BD}`}},
          d({style:{fontSize:13,color:GR}},'No tallies yet')
        ),
        d({style:{flex:1,minWidth:110,background:GNB,borderRadius:12,padding:'14px 16px'}},
          d({style:{fontSize:11,color:GN,fontWeight:700,marginBottom:2}},'SHED TOTAL'),
          d({style:{fontSize:30,fontWeight:800,color:GN}},st.total)
        )
      ),
      ...dd.runs.map(r=>e(RunCard,{key:r.id,run:r,shearers:job.shearers,
        onUpdate:u=>updateJob({...job,week:{...job.week,[day]:{...dd,runs:dd.runs.map(x=>x.id===r.id?u:x)}}}),
        onDelete:()=>updateJob({...job,week:{...job.week,[day]:{...dd,runs:dd.runs.filter(x=>x.id!==r.id)}}})})),
      dd.runs.length<10&&btn({onClick:addRun,style:{width:'100%',padding:'12px',borderRadius:12,border:`2px dashed ${N}`,fontSize:14,fontWeight:700,color:N,background:'transparent',marginBottom:12,opacity:0.4}},
        '+ Add Run '+(dd.runs.length+1)),
      d({style:{background:'#fff',borderRadius:14,border:`1px solid ${BD}`,padding:'16px 18px',marginBottom:12}},
        d({style:{fontSize:11,fontWeight:700,color:GR,textTransform:'uppercase',letterSpacing:1.2,marginBottom:10}},'Shearer totals'),
        d({className:'hs'},
          e('table',{style:{borderCollapse:'collapse',fontSize:13}},
            e('thead',null,e('tr',{style:{background:'#f9fafb'}},
              e('th',{style:{padding:'8px 12px',textAlign:'left',fontWeight:700,color:GR,borderBottom:`1px solid ${BD}`,whiteSpace:'nowrap'}},'Name'),
              ...['SH BF','SH Day','SH Tot','CR BF','CR Day','CR Tot'].map(h=>e('th',{key:h,style:{padding:'8px 14px',textAlign:'center',fontWeight:600,color:GR,borderBottom:`1px solid ${BD}`,fontSize:11,whiteSpace:'nowrap',minWidth:62}},h))
            )),
            e('tbody',null,...job.shearers.map((s,i)=>{
              const t=getShT(job,s.id,day),has=t.shearing.tot>0||t.crutching.tot>0;
              return e('tr',{key:s.id,style:{background:i%2===0?'#fff':'#fafafa',opacity:has?1:0.3}},
                e('td',{style:{padding:'10px 12px',fontWeight:700,whiteSpace:'nowrap'}},s.name),
                e('td',{style:{padding:'10px 14px',textAlign:'center',color:GR}},t.shearing.bf||'—'),
                e('td',{style:{padding:'10px 14px',textAlign:'center',fontWeight:700,color:BL}},t.shearing.day||'—'),
                e('td',{style:{padding:'10px 14px',textAlign:'center',fontWeight:800,color:N,fontSize:15}},t.shearing.tot||'—'),
                e('td',{style:{padding:'10px 14px',textAlign:'center',color:GR}},t.crutching.bf||'—'),
                e('td',{style:{padding:'10px 14px',textAlign:'center',fontWeight:700,color:CR}},t.crutching.day||'—'),
                e('td',{style:{padding:'10px 14px',textAlign:'center',fontWeight:800,color:N,fontSize:15}},t.crutching.tot||'—')
              );
            }))
          )
        ),
        d({style:{fontSize:11,color:'#ccc',marginTop:8}},'SH=Shearing · CR=Crutching · BF=Brought Fwd · Tot=To Date')
      ),
      d({style:{background:'#fff',borderRadius:14,border:`1px solid ${BD}`,padding:'16px 18px',marginBottom:12}},
        d({style:{fontSize:11,fontWeight:700,color:GR,textTransform:'uppercase',letterSpacing:1.2,marginBottom:10}},'Shed staff'),
        ...job.staff.map(st=>{
          const tots=getStT(job,st.id,day);
          return d({key:st.id,style:{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',padding:'10px 0',borderBottom:`1px solid #f3f4f6`}},
            d({style:{width:36,height:36,borderRadius:'50%',background:N,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:14,flexShrink:0}},st.name[0]),
            d({style:{flex:1,minWidth:80}},
              d({style:{fontWeight:700,fontSize:14}},st.name),
              d({style:{fontSize:12,color:GR}},st.role)
            ),
            d({style:{display:'flex',alignItems:'center',gap:6}},
              sp({style:{fontSize:12,color:GR}},'Runs:'),
              inp({type:'number',min:0,max:20,value:dd.staff[st.id]?.runs||'',
                onChange:ev=>updateJob({...job,week:{...job.week,[day]:{...dd,staff:{...dd.staff,[st.id]:{...dd.staff[st.id],runs:Number(ev.target.value)||0}}}}}),
                style:{width:50,padding:'6px 8px',borderRadius:8,border:`1px solid ${BD}`,fontSize:16,textAlign:'center',fontWeight:700}})
            ),
            d({style:{display:'flex',gap:6,flexWrap:'wrap'}},
              ...[ ['BF',tots.bf,''],['Today',tots.day,N],['To Date',tots.tot,GN],['Travel','$'+(job.travel[st.id]||0),''] ].map(([l,v,c])=>
                d({key:l,style:{background:'#f9fafb',borderRadius:8,padding:'6px 10px',textAlign:'center',minWidth:54}},
                  d({style:{fontSize:10,color:GR,marginBottom:2}},l),
                  d({style:{fontSize:14,fontWeight:700,color:c||'#1a1a2e'}},v)
                )
              )
            )
          );
        })
      ),
      d({style:{background:'#fff',borderRadius:14,border:`1px solid ${BD}`,padding:'16px 18px'}},
        d({style:{fontSize:11,fontWeight:700,color:GR,textTransform:'uppercase',letterSpacing:1.2,marginBottom:10}},'Notes'),
        e('textarea',{value:dd.notes,onChange:ev=>updateJob({...job,week:{...job.week,[day]:{...dd,notes:ev.target.value}}}),
          placeholder:'Notes for the day...',rows:3,style:{width:'100%',padding:'10px 12px',borderRadius:8,border:`1px solid ${BD}`,fontSize:14,resize:'vertical',lineHeight:1.6}})
      )
    ),

    tab==='summary'&&d(null,
      d({style:{background:N,borderRadius:14,padding:'20px',marginBottom:12}},
        d({style:{color:AM,fontSize:12,fontWeight:700,letterSpacing:1,marginBottom:4}},'END OF SHED SUMMARY'),
        d({style:{color:'#fff',fontSize:20,fontWeight:800}},job.property),
        d({style:{color:'#93c5fd',fontSize:13}},'Woolaway Shearing Co. — Lachlan Holmes'),
        d({style:{display:'flex',justifyContent:'flex-end',marginTop:8}},
          d({style:{textAlign:'right'}},
            d({style:{color:'#93c5fd',fontSize:12}},'Total sheep'),
            d({style:{color:AM,fontSize:36,fontWeight:800}},st.total)
          )
        )
      ),
      d({style:{background:'#fff',borderRadius:14,border:`1px solid ${BD}`,padding:'16px 18px',marginBottom:12}},
        d({style:{fontSize:11,fontWeight:700,color:GR,textTransform:'uppercase',letterSpacing:1.2,marginBottom:10}},'Shearers'),
        d({className:'hs'},
          e('table',{style:{borderCollapse:'collapse',fontSize:13,width:'100%'}},
            e('thead',null,e('tr',{style:{background:'#f9fafb'}},
              ...['Name','Shearing','Crutching','Travel'].map(h=>e('th',{key:h,style:{padding:'8px 12px',textAlign:h==='Name'?'left':'center',fontWeight:600,color:GR,borderBottom:`1px solid ${BD}`,whiteSpace:'nowrap'}},h))
            )),
            e('tbody',null,...job.shearers.map((s,i)=>{
              let sh=0,cr=0;
              DAYS.forEach(dy=>{(job.week[dy]?.runs||[]).forEach(r=>r.counts.forEach(c=>{const v=Number(c.counts[s.id]||0);if(c.job==='Shearing')sh+=v;else cr+=v;}));});
              if(!sh&&!cr)return null;
              return e('tr',{key:s.id,style:{background:i%2===0?'#fff':'#fafafa'}},
                e('td',{style:{padding:'10px 12px',fontWeight:700}},s.name),
                e('td',{style:{padding:'10px 12px',textAlign:'center',color:BL,fontWeight:700}},sh||'—'),
                e('td',{style:{padding:'10px 12px',textAlign:'center',color:CR,fontWeight:700}},cr||'—'),
                e('td',{style:{padding:'10px 12px',textAlign:'center',color:GR}},'$'+(job.travel[s.id]||0))
              );
            }))
          )
        )
      ),
      admin&&btn({onClick:()=>{
        const rows=[['Name','Role','Shearing','Crutching','Travel']];
        job.shearers.forEach(s=>{let sh=0,cr=0;DAYS.forEach(dy=>{(job.week[dy]?.runs||[]).forEach(r=>r.counts.forEach(c=>{const v=Number(c.counts[s.id]||0);if(c.job==='Shearing')sh+=v;else cr+=v;}));});rows.push([s.name,'Shearer',sh,cr,job.travel[s.id]||0]);});
        job.staff.forEach(st=>{let runs=0;DAYS.forEach(dy=>{runs+=Number((job.week[dy]?.staff||{})[st.id]?.runs||0);});rows.push([st.name,st.role,'-','-',job.travel[st.id]||0]);});
        const csv=rows.map(r=>r.join(',')).join('\n');
        const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='igang-'+job.property.replace(/\s/g,'-')+'.csv';a.click();
      },style:{width:'100%',padding:'14px',borderRadius:12,background:GN,color:'#fff',fontSize:15,fontWeight:700,border:'none'}},'Download CSV — '+job.property)
    ),

    tab==='admin'&&admin&&d(null,
      d({style:{background:'#fff',borderRadius:14,border:`1px solid ${BD}`,padding:'16px 18px',marginBottom:12}},
        d({style:{fontSize:11,fontWeight:700,color:GR,textTransform:'uppercase',letterSpacing:1.2,marginBottom:12}},'Pay rates'),
        d({style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}},
          ...['shearing','crutching'].map(k=>
            d({key:k},
              e('label',{style:{fontSize:13,fontWeight:600,color:GR,display:'block',marginBottom:6}},k.charAt(0).toUpperCase()+k.slice(1)+' $/head'),
              inp({type:'number',step:0.05,value:job.rates[k],onChange:ev=>updateJob({...job,rates:{...job.rates,[k]:Number(ev.target.value)}}),style:{width:'100%',padding:'10px',borderRadius:8,border:`1px solid ${BD}`,fontSize:16,fontWeight:700}})
            )
          )
        )
      ),
      d({style:{background:'#fff',borderRadius:14,border:`1px solid ${BD}`,padding:'16px 18px'}},
        d({style:{fontSize:11,fontWeight:700,color:GR,textTransform:'uppercase',letterSpacing:1.2,marginBottom:12}},'Travel allowances'),
        d({style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}},
          ...[...job.shearers,...job.staff].map(person=>
            d({key:person.id,style:{display:'flex',alignItems:'center',gap:8,background:'#f9fafb',borderRadius:8,padding:'10px 12px'}},
              sp({style:{fontWeight:700,fontSize:13,flex:1}},person.name),
              sp({style:{fontSize:14,color:GR}},'$'),
              inp({type:'number',value:job.travel[person.id]||0,onChange:ev=>updateJob({...job,travel:{...job.travel,[person.id]:Number(ev.target.value)}}),style:{width:64,padding:'6px 8px',borderRadius:6,border:`1px solid ${BD}`,fontSize:15,fontWeight:700,textAlign:'center'}})
            )
          )
        )
      )
    )
  );
}

function HomeScreen({jobs,onSelect}){
  const todayAll=jobs.reduce((s,j)=>s+getDT(j,'monday').total,0);
  const shedAll=jobs.reduce((s,j)=>s+getST(j).total,0);
  return d(null,
    d({style:{background:`linear-gradient(135deg,${ND},${N})`,borderRadius:16,padding:'20px',marginBottom:20,color:'#fff'}},
      d({style:{color:AM,fontSize:12,fontWeight:700,letterSpacing:1,marginBottom:4}},'WOOLAWAY SHEARING CO.'),
      d({style:{color:'#93c5fd',fontSize:14,marginBottom:16}},'Lachlan Holmes — '+jobs.filter(j=>j.status==='active').length+' active jobs'),
      d({style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}},
        d({style:{background:'rgba(255,255,255,0.08)',borderRadius:10,padding:'12px 14px'}},
          d({style:{fontSize:11,color:'#93c5fd',marginBottom:4}},'TODAY ALL SHEDS'),
          d({style:{fontSize:28,fontWeight:800,color:'#fff'}},todayAll.toLocaleString()),
          d({style:{fontSize:11,color:'#64748b'}},'head')
        ),
        d({style:{background:'rgba(255,255,255,0.08)',borderRadius:10,padding:'12px 14px'}},
          d({style:{fontSize:11,color:'#93c5fd',marginBottom:4}},'ALL JOBS TOTAL'),
          d({style:{fontSize:28,fontWeight:800,color:AM}},shedAll.toLocaleString()),
          d({style:{fontSize:11,color:'#64748b'}},'shed total')
        )
      )
    ),
    d({style:{fontSize:11,fontWeight:700,color:GR,textTransform:'uppercase',letterSpacing:1.2,marginBottom:12}},'Active jobs'),
    ...jobs.map(j=>{
      const dayT=getDT(j,'monday'),shedT=getST(j);
      const [tbg,tc]=j.type==='Shearing'?[BLB,BL]:[CRB,CR];
      return d({key:j.id,onClick:()=>onSelect(j.id),style:{background:'#fff',borderRadius:14,border:`1px solid ${BD}`,marginBottom:12,overflow:'hidden',cursor:'pointer'},
        onMouseEnter:ev=>ev.currentTarget.style.boxShadow='0 4px 20px rgba(0,0,0,0.1)',
        onMouseLeave:ev=>ev.currentTarget.style.boxShadow='none'},
        d({style:{padding:'14px 16px',borderBottom:`1px solid #f3f4f6`}},
          d({style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}},
            d(null,
              d({style:{display:'flex',alignItems:'center',gap:8,marginBottom:6}},
                sp({style:{background:GNB,color:GN,fontSize:11,fontWeight:700,padding:'2px 10px',borderRadius:20}},'Active'),
                sp({style:{background:tbg,color:tc,fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:12}},j.type)
              ),
              d({style:{fontWeight:800,fontSize:18,color:N,marginBottom:2}},j.property),
              d({style:{fontSize:12,color:GR}},j.address+' — from '+j.start)
            ),
            d({style:{textAlign:'right'}},
              d({style:{fontSize:11,color:GR,marginBottom:2}},'Today'),
              d({style:{fontSize:24,fontWeight:800,color:BL}},dayT.total)
            )
          )
        ),
        d({style:{padding:'12px 16px',display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}},
          ...[['Shearers',j.shearers.length],['Staff',j.staff.length],['Shed total',shedT.total],['Days run',DAYS.filter(dy=>(j.week[dy]?.runs||[]).length>0).length]].map(([l,v])=>
            d({key:l,style:{textAlign:'center'}},
              d({style:{fontSize:10,color:GR,marginBottom:2}},l),
              d({style:{fontSize:16,fontWeight:700,color:N}},v)
            )
          )
        ),
        d({style:{padding:'0 16px 12px',textAlign:'right'}},
          sp({style:{fontSize:13,fontWeight:700,color:BL}},'Open job →')
        )
      );
    })
  );
}

function App(){
  const [jobs,setJobs]=useState(JOBS);
  const [selId,setSelId]=useState(null);
  const [admin,setAdmin]=useState(false);
  const [showPin,setShowPin]=useState(false);
  const [pin,setPin]=useState('');
  const [pinErr,setPinErr]=useState(false);
  const selJob=jobs.find(j=>j.id===selId);
  const updJob=u=>setJobs(js=>js.map(j=>j.id===u.id?u:j));
  const tryUnlock=()=>{if(pin===PIN){setAdmin(true);setShowPin(false);setPin('');}else setPinErr(true);};

  return d({style:{minHeight:'100vh',background:'#f0f2f5'}},
    d({style:{background:`linear-gradient(135deg,${ND},${N})`,padding:'0 16px',boxShadow:'0 2px 12px rgba(0,0,0,0.2)'}},
      d({style:{maxWidth:720,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between',height:56}},
        d({style:{display:'flex',alignItems:'center',gap:10}},
          d({style:{width:34,height:34,borderRadius:10,background:AM,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:16,color:'#fff'}},'iG'),
          d(null,
            d({style:{color:'#fff',fontWeight:800,fontSize:16}},'iGang'),
            d({style:{color:'#93c5fd',fontSize:10,fontWeight:600}},'Woolaway Shearing Co.')
          )
        ),
        btn({onClick:()=>{if(admin){setAdmin(false);}else{setShowPin(true);setPinErr(false);setPin('');}},
          style:{padding:'6px 12px',borderRadius:8,fontSize:12,fontWeight:700,background:admin?GNB:'transparent',color:admin?GN:'#93c5fd'}},
          admin?'Admin ON':'Admin')
      )
    ),
    showPin&&d({style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100,padding:20}},
      d({style:{background:'#fff',borderRadius:16,padding:28,width:'100%',maxWidth:320,textAlign:'center'}},
        d({style:{fontSize:32,marginBottom:12}},'🔒'),
        d({style:{fontWeight:700,fontSize:18,marginBottom:6}},'Admin Access'),
        d({style:{fontSize:13,color:GR,marginBottom:20}},'Enter contractor PIN'),
        inp({type:'password',value:pin,onChange:ev=>{setPin(ev.target.value);setPinErr(false);},onKeyDown:ev=>{if(ev.key==='Enter')tryUnlock();},placeholder:'PIN',
          style:{width:'100%',padding:'12px',borderRadius:10,border:`1px solid ${pinErr?RD:BD}`,fontSize:22,textAlign:'center',marginBottom:8,letterSpacing:6}}),
        pinErr&&d({style:{color:RD,fontSize:13,marginBottom:8}},'Incorrect PIN'),
        d({style:{display:'flex',gap:8,marginTop:8}},
          btn({onClick:()=>setShowPin(false),style:{flex:1,padding:'12px',borderRadius:10,border:`1px solid ${BD}`,fontSize:14,fontWeight:600,color:GR}},'Cancel'),
          btn({onClick:tryUnlock,style:{flex:1,padding:'12px',borderRadius:10,background:N,color:'#fff',fontSize:14,fontWeight:700,border:'none'}},'Unlock')
        ),
        d({style:{fontSize:11,color:'#ccc',marginTop:12}},'Demo PIN: 1234')
      )
    ),
    d({style:{maxWidth:720,margin:'0 auto',padding:'16px 12px 40px'}},
      selJob?e(JobView,{job:selJob,updateJob:updJob,onBack:()=>setSelId(null),admin}):e(HomeScreen,{jobs,onSelect:setSelId})
    ),
    d({style:{background:'rgba(255,255,255,0.9)',borderTop:`1px solid ${BD}`,padding:'8px 16px',textAlign:'center'}},
      d({style:{fontSize:11,color:'#d1d5db'}},'iGang · Powered by Southern Reach Digital · southernreachdigital.com.au')
    )
  );
}

createRoot(document.getElementById('root')).render(e(App));
</script>
